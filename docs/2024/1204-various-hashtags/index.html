      <h2>[メモ] ハッシュタグ集</h2>

      <div class="article_info_wrap">
        <div class="article_info">
          2024/12/04 |
          <a href="https://github.com/shapoco/blog/tree/main/src/article/2024/1204-various-hashtags/" target="_blank">記事のソース</a>
        </div>

        <div id="shpcstamp_wrap"></div>
        <script async src="/stamp/v1/widget.js?3d92a021"></script>
      </div>

              <p>ハッシュタグのメモ</p>
        <p><div id="article_sections"><p>読み込んでいます...</p></div></p>
        <script>
            function articleGenerateList(category) {
                var html = ''
                html += '<h2>' + category.title + '</h2>';
                html += '<ul>';
                Array.from(category.tags).toSorted().forEach(tag => {
                    html += '<li><a href="https://x.com/hashtag/' + encodeURIComponent(tag) + '?f=live" target="_blank">' + tag + '</a></li>';
                });
                html += '</ul>';
                return html;
            }
            const container = document.querySelector('#article_sections');
            fetch('./hashtags.json?6ff6da08')
                .then(response => response.json())
                .then(json_obj => {
                    var html = '';
                    json_obj.categories.forEach(category => {
                        html += articleGenerateList(category);
                    });
                    container.innerHTML = html;
                    arrangeArticleHtml(container);
                })
                .catch(error => {
                    container.innerHTML = '<p>⚠ 記事の読み込みに失敗しました。</p>';
                    arrangeArticleHtml(container);
                });
        </script>


      <h3>関連記事</h3>
      <ul id="related_articles">
        <li>関連記事を読み込んでいます...</li>
      </ul>
      <script>
        const my_tags = "".split(',').map(s => s.trim()).filter(s => s != '');
        const ul = document.querySelector('#related_articles');
        fetch('/index.json?014c677a')
          .then(response => response.json())
          .then(json_obj => {
            const articles = json_obj.articles.reverse();
            var related_articles = [];
            for (const a of articles) {
              if (a.title == "[メモ] ハッシュタグ集") {
                continue;
              }
              let score = 0;
              let tags = [];
              for (let my_pos = 0; my_pos < my_tags.length; my_pos++) {
                const t = my_tags[my_pos];
                const other_pos = a.tags.indexOf(t);
                if (other_pos >= 0) {
                  score += Math.ceil(10000 / (my_pos * other_pos + 1));
                  tags.push(t);
                  console.log(`related: ${a.title} (score=${score}) [${tags.join(', ')}]`);
                }
              }
              if (score > 0) {
                related_articles.push({ article: a, score: score, tags: tags });
              }
            }
            related_articles.sort((a, b) => b.score - a.score);

            if (related_articles.length > 0) {
              ul.innerHTML = '';
              for (const a of related_articles.slice(0, 5)) {
                const li = document.createElement('li');
                const a_tag = document.createElement('a');
                a_tag.href = a.article.url;
                a_tag.textContent = a.article.title;
                a_tag.title = `共通タグ: ${a.tags.join(', ')}`;
                li.appendChild(a_tag);
                ul.appendChild(li);
              }
            }
            else {
              ul.innerHTML = '<li>関連記事はありません。</li>';
            }
          });
      </script>
